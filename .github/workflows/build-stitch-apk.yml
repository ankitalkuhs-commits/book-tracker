name: Build Stitch APK (Preview)

on:
  workflow_dispatch:  # Manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: book-tracker-mobile-stitch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: book-tracker-mobile-stitch/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build Android APK
        run: eas build --platform android --profile preview --local --output ./build.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackMyRead-stitch-preview
          path: book-tracker-mobile-stitch/build.apk
          retention-days: 7
